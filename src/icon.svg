<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0a2218"/>
  
  <!-- Basketball circle -->
  <circle cx="256" cy="220" r="110" fill="none" stroke="#d4621a" stroke-width="10"/>
  
  <!-- Basketball lines -->
  <!-- Vertical center line -->
  <line x1="256" y1="110" x2="256" y2="330" stroke="#d4621a" stroke-width="7"/>
  <!-- Horizontal center line -->
  <line x1="146" y1="220" x2="366" y2="220" stroke="#d4621a" stroke-width="7"/>
  <!-- Left curve -->
  <path d="M 146 220 Q 185 150 256 110" fill="none" stroke="#d4621a" stroke-width="7"/>
  <path d="M 146 220 Q 185 290 256 330" fill="none" stroke="#d4621a" stroke-width="7"/>
  <!-- Right curve -->
  <path d="M 366 220 Q 327 150 256 110" fill="none" stroke="#d4621a" stroke-width="7"/>
  <path d="M 366 220 Q 327 290 256 330" fill="none" stroke="#d4621a" stroke-width="7"/>

  <!-- NG text below -->
  <text x="256" y="400" font-family="Georgia, serif" font-size="72" font-weight="bold" 
        fill="#ffffff" text-anchor="middle" letter-spacing="8">NB</text>
  
  <!-- Small accent line -->
  <rect x="156" y="418" width="200" height="4" rx="2" fill="#d4621a"/>
  
  <!-- Small year text -->
  <text x="256" y="450" font-family="Georgia, serif" font-size="22" 
        fill="rgba(255,255,255,0.45)" text-anchor="middle" letter-spacing="4">1964–2020</text>
</svg>
